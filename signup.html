<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Zain:ital,wght@0,200;0,300;0,400;0,700;0,800;0,900;1,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="signup.css">
    <link rel="icon" type="image/png" href="favicon.ico">
    <title>Sign Up | Neriva</title>
    <link rel=" icon" href="logo.jpg" type="image/x-icon">
    <link rel="shortcut icon" href="favicon.ico" type="image/png">
</head>
<body>
    <div class="signup-container fade-in">
        <a href="../homepage/index.html" class="back-link">
            <img src="favicon_io/favicon.ico" alt="Neriva" class="logo">
        </a>
        <h1><span class="title-gold">Join</span> <span class="title-black">Neriva</span></h1>
        <p class="subtitle">Create your account to order </p>
        <form id="signupForm">
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
            </div>
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="example@email.com" required>
            </div>
            <div class="input-group">
                <label for="confirm-email">Confirm Email</label>
                <input type="email" id="confirm-email" name="confirm-email" placeholder="Confirm your email" required>
                <p class="error-message" id="email-error">Emails do not match.</p>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a password" required>
            </div>
            <div class="input-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required>
                <p class="error-message" id="password-error">Passwords do not match.</p>
            </div>
            <div class="input-group">
                <label for="phone number">Phone umber</label>
                <input type="number" id="number" name="number" placeholder="+(213) 567-890" required>
            </div>
            <div class="input-group">
                <label for="phone number">Confirm Phone Number</label>
                <input type="number" id="number" name="number" placeholder="+(213) 567-890" required>
            </div>
            
            <button type="submit" class="btn">Create Account</button>
        </form>
        <div class="footer">
            Already have an account? <a href="../Login/login.html">sign in </a>
        </div>
    </div>

   
    <div class="popup" id="successPopup">
        <div class="popup-content scale-in">
            <div class="popup-icon success">✓</div>
            <h2>Account Created!</h2>
            <p>Welcome to Neriva. Your account has been successfully created.</p>
            <a href="../homepage/index.html">
                <button class="popup-btn" onclick="closePopup()">Explore menu</button>
            </a>
        </div>
    </div>

    
    <div class="popup" id="errorPopup">
        <div class="popup-content scale-in">
            <div class="popup-icon error">✕</div>
            <h2>Oops!</h2>
            <p id="errorMessage">Please check your information and try again.</p>
            <button class="popup-btn" onclick="closeErrorPopup()">OK</button>
        </div>
    </div>

    <script src="signup.js"></script>
    <script src="signup.js"></script>
</body>
</html>
