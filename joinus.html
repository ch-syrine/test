<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Zain:ital,wght@0,200;0,300;0,400;0,700;0,800;0,900;1,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="joinus.css">
    <title>Cook With Us | Neriva</title>
    <link rel=" icon" href="logo.jpg" type="image/x-icon">
    <link rel="shortcut icon" href="favicon.ico" type="image/png">
</head>
<body>
    <div class="container fade-in">
        <a href="../homepage/index.html" class="back-link">
            <img src="favicon_io/favicon.ico" alt="Neriva" class="logo">
        </a>
        <h1><span class="title-gold">Join Us</span> <span class="title-black">as a Chef</span></h1>
        <p class="subtitle">Share your passion for healthy cooking with Neriva</p>

        <form id="designerForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="your.email@example.com" required>
            </div>

            <div class="form-group">
                <label for="portfolio">Recipe Portfolio / Social Link (Optional)</label>
                <input type="url" id="portfolio" placeholder="https://yourrecipes.com or Instagram profile">
            </div>

            <div class="form-group">
                <label for="designs">Upload Your Dishes</label>
                <div class="file-input-wrapper">
                    <input type="file" id="designs" multiple accept="image/*" class="file-input">
                    <label for="designs" class="file-label">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <span>Upload photos of your meals</span>
                    </label>
                    <div class="file-list" id="fileList"></div>
                </div>
            </div>

            <div class="form-group">
                <label for="message">Tell Us About Your Cooking</label>
                <textarea id="message" rows="5" placeholder="Share your cooking style, favorite ingredients, and what makes your meals healthy and unique..." required></textarea>
            </div>

            <button type="submit" class="btn">
                <i class="fas fa-paper-plane"></i> Submit Application
            </button>
        </form>
    </div>

    <div class="popup" id="successPopup">
        <div class="popup-content scale-in">
            <div class="popup-icon success">✓</div>
            <h2>Application Submitted!</h2>
            <p>Thank you for joining Neriva! We'll review your profile and contact you soon.</p>
            <button class="popup-btn" onclick="closePopup()">Back to Home</button>
        </div>
    </div>

    <script src="joinus.js"></script>
</body>
</html>
